 <div class="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-200 p-4 md:p-8 flex items-center justify-center font-sans">
    <div class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[85vh]">
      
        <header class="bg-indigo-600 p-6 flex flex-wrap items-center justify-between shadow-md z-10 gap-4">
            <div class="flex items-center space-x-4">
              <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center text-white border border-white/30 shadow-inner">
                ZCN
              </div>
              <div>
                <h1 class="text-white font-bold text-xl tracking-tight">Games Chatbot</h1>
                <p class="text-indigo-100 text-xs flex items-center mt-0.5">
                  <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse shadow-[0_0_8px_rgba(74,222,128,0.8)]"></span>
                  AI Agent Active
                </p>
              </div>
            </div>
      
            <div class="flex items-center gap-2">
              <!-- Game 1 Button -->
              <a routerLink="/game" class="flex items-center px-4 py-2 bg-fuchsia-500 hover:bg-fuchsia-600 text-white rounded-xl transition-all text-sm font-bold shadow-[0_0_15px_rgba(217,70,239,0.4)] active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z" />
                </svg>
                Shapes
              </a>
      
              <!-- Game 2 Button -->
              <a routerLink="/running-game" class="flex items-center px-4 py-2 bg-cyan-500 hover:bg-cyan-600 text-white rounded-xl transition-all text-sm font-bold shadow-[0_0_15px_rgba(6,182,212,0.4)] active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                Runner
              </a>

                <!-- Game 3 Button -->
                <a routerLink="/combat-game" class="flex items-center px-4 py-2 bg-green-500 hover:bg-cyan-600 text-white rounded-xl transition-all text-sm font-bold shadow-[0_0_15px_rgba(6,182,212,0.4)] active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    Combat
                  </a>
      
              <div class="w-[1px] h-8 bg-white/20 mx-1"></div>
      
              <button (click)="clearChat()" class="px-4 py-2 text-indigo-100 hover:bg-white/10 rounded-xl transition-all text-sm font-medium border border-white/20">
                Reset
              </button>
            </div>
          </header>

      <main 
        #scrollContainer
        class="flex-1 p-6 overflow-y-auto bg-slate-50 space-y-6 scroll-smooth"
      >
        @if (chatHistory().length === 0) {
          <div class="h-full flex flex-col items-center justify-center text-center p-8 space-y-4 opacity-60">
            <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
              </svg>
            </div>
            <p class="text-slate-500 font-medium">No messages yet. Start a conversation with Gemini!</p>
          </div>
        }

        @for (msg of chatHistory(); track $index) {
          <div class="flex w-full animate-in fade-in slide-in-from-bottom-2 duration-300" 
               [class.justify-end]="msg.role === 'user'" 
               [class.justify-start]="msg.role === 'model'">
            
            <div [class]="msg.role === 'user' 
              ? 'bg-indigo-600 text-white rounded-2xl rounded-tr-none shadow-indigo-200' 
              : 'bg-white border border-slate-200 text-slate-800 rounded-2xl rounded-tl-none shadow-slate-100'"
              class="message-bubble p-4 max-w-[85%] shadow-lg transition-all"
            >
              <div class="whitespace-pre-wrap leading-relaxed">{{ msg.parts[0].text }}</div>
            </div>
          </div>
        }

        @if (isTyping()) {
          <div class="flex justify-start animate-in fade-in duration-300">
            <div class="bg-white border border-slate-200 p-5 rounded-2xl rounded-tl-none shadow-sm flex space-x-1.5">
              <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
              <div class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
              <div class="w-2 h-2 bg-indigo-600 rounded-full animate-bounce"></div>
            </div>
          </div>
        }
      </main>

      <footer class="p-5 bg-white border-t border-slate-100 shadow-2xl relative z-10">
        <div class="flex items-center space-x-3 bg-slate-100 p-2 rounded-2xl focus-within:ring-2 focus-within:ring-indigo-500/20 transition-all border border-transparent focus-within:border-indigo-300">
          <input 
            #inputField
            type="text" 
            placeholder="Ask me anything..." 
            (keyup.enter)="sendMessage(inputField)"
            class="flex-1 bg-transparent p-3 outline-none text-slate-700 placeholder:text-slate-400 font-medium"
            [disabled]="isTyping()"
          >
          <button 
            (click)="sendMessage(inputField)"
            [disabled]="isTyping() || !inputField.value.trim()"
            class="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 active:scale-95 transition-all shadow-lg shadow-indigo-200 disabled:opacity-40 disabled:cursor-not-allowed group"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
          </button>
        </div>
      </footer>
    </div>
  </div>
